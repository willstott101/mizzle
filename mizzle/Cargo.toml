[package]
name = "mizzle"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
trillium = "0.2"
trillium-smol = "0.4"
log = "0.4"
simple_logger = "5.2"
form_urlencoded = "1.2"
gix = { version = "0.80", features = ["parallel"] }
gix-packetline = { version = "0.21", features = ["async-io"] }
gix-ref = "0.60"
gix-pack = "0.67"
gix-features = { version = "0.46", features = ["parallel"] }
futures-lite = "2.6"
smol = "2.0"
piper = "0.2"
anyhow = "1.0"
faster-hex = "0.10"
axum = { version = "0.8.8", features = ["macros"] }
tokio = { version = "1.49.0", features = ["full", "macros", "rt-multi-thread"] }
tokio-utils = "0.1.2"

[dev-dependencies]
tempfile = "3.25.0"
